# Per-repo command allowlist. No dev verbs declared yet; present so coily's
# repocfg loader recognizes the repo and the lockdown discipline is uniform
# across coilysiren/* checkouts. Add verbs here as they emerge.

commands:
  build-native:
    run: uv lock && uv sync
    description: uv lock + uv sync.

# Catalog metadata for the cross-repo knowledge graph.
# Schema: coilysiren/agentic-os-kai#420 (tracker).
catalog:
  kind: Component
  type: tool
  system: coily-platform
  owner: kai
  lifecycle: production
  description: "Pre-commit hooks for Claude Code skill repositories. Small validators that catch the kinds of drift agent harnesses silently route around."
  dependsOn: []
  providesApis:
    - claude-skill-precommit-hooks
